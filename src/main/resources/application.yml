spring:
  application:
    name: delivery-slot-optimizer

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:delivery_optimizer}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: create-drop       # let Hibernate create schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  sql:
    init:
      mode: never                 # disable automatic schema.sql loading

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  slot:
    default-capacity: 20          # default slots per zone per time window
    window-duration-minutes: 30   # each slot window is 30 min
    windows-per-day: 24           # 12-hour day / 30 min windows
    overload-threshold: 0.85      # zone considered "busy" at 85% fill
  sse:
    heartbeat-interval-ms: 15000  # keepalive ping every 15s
  seed:
    zones: 6
    run-on-startup: true
