server {
    listen 80;
    server_name _;

    # ── Static dashboard ──────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://app:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # ── SSE-specific settings ─────────────────────────────
        # Disable buffering so SSE events are flushed immediately
        proxy_buffering    off;
        proxy_cache        off;

        # Keep SSE connections alive for up to 5 minutes
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;

        # Required for SSE (disables chunked TE negotiation quirks)
        proxy_set_header   Connection        '';

        add_header Cache-Control "no-cache";
    }

    # ── Health endpoint (for load-balancer checks) ────────────
    location /health {
        proxy_pass http://app:8080/api/actuator/health;
        proxy_buffering off;
    }
}
