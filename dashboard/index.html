<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delivery Slot Optimizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f1a;
      --surface:  #161927;
      --surface2: #1e2235;
      --border:   #252840;
      --text:     #e2e8f0;
      --muted:    #556080;
      --green:    #22c55e;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --blue:     #3b82f6;
      --indigo:   #6366f1;
      --teal:     #14b8a6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 0;
    }

    /* ── Header ─────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo span { color: var(--indigo); }
    .tagline { font-size: 0.75rem; color: var(--muted); }

    .conn-pill {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.75rem; color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 5px 13px; border-radius: 999px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); transition: background .3s; }
    .dot.live { background: var(--green); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Summary bar ─────────────────────────────── */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .summary-stat {
      padding: 14px 20px;
      border-right: 1px solid var(--border);
    }
    .summary-stat:last-child { border-right: none; }
    .summary-stat .val { font-size: 1.6rem; font-weight: 700; line-height: 1; }
    .summary-stat .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

    /* ── Main layout ─────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0;
      overflow: hidden;
    }

    .panel-left {
      padding: 20px 24px;
      overflow-y: auto;
    }

    .panel-right {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Controls ────────────────────────────────── */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      align-items: center;
    }
    .ctrl-group { display: flex; align-items: center; gap: 6px; }
    .ctrl-group label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    select, input[type=number] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 0.8rem;
    }
    button {
      background: var(--indigo);
      color: #fff; border: none;
      padding: 7px 15px;
      border-radius: 7px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: opacity .2s, background .2s;
      white-space: nowrap;
    }
    button:hover { opacity: .85; }
    button.sec {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Zone cards ──────────────────────────────── */
    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .zones-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .zone-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: border-color .25s, transform .15s;
    }
    .zone-card:hover { border-color: var(--indigo); transform: translateY(-1px); }
    .zone-card.selected { border-color: var(--indigo); box-shadow: 0 0 0 2px rgba(99,102,241,.25); }
    .zone-card.flash { animation: flash-border .6s ease; }
    @keyframes flash-border {
      0%   { border-color: var(--teal); }
      100% { border-color: var(--border); }
    }

    .zc-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 12px;
    }
    .zc-name { font-weight: 600; font-size: .95rem; }
    .zc-city { font-size: .72rem; color: var(--muted); margin-top: 2px; }

    .badge {
      font-size: .65rem; font-weight: 700;
      padding: 3px 9px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .badge.active    { background: rgba(34,197,94,.15);  color: var(--green); }
    .badge.overload  { background: rgba(239,68,68,.15);  color: var(--red); }
    .badge.suspended { background: rgba(245,158,11,.15); color: var(--amber); }

    .zc-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .zc-stat .val { font-size: 1.25rem; font-weight: 700; line-height: 1; }
    .zc-stat .lbl { font-size: .65rem; color: var(--muted); margin-top: 2px; }

    .bar-bg { height: 5px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; transition: width .6s ease, background .4s; }
    .bar-row { display: flex; justify-content: space-between; font-size: .68rem; color: var(--muted); margin-top: 5px; }

    .fleet-row {
      display: flex; align-items: center; gap: 5px;
      font-size: .72rem; color: var(--muted); margin-top: 9px;
    }

    /* ── Slot heatmap ────────────────────────────── */
    .slot-section { margin-bottom: 24px; }
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(54px, 1fr));
      gap: 4px;
    }
    .slot-cell {
      border-radius: 5px;
      padding: 5px 4px;
      text-align: center;
      font-size: .6rem;
      cursor: pointer;
      transition: transform .1s, opacity .2s;
      border: 1px solid transparent;
    }
    .slot-cell:hover { transform: scale(1.08); }
    .slot-cell.full      { background: rgba(239,68,68,.15);  color: var(--red);   border-color: rgba(239,68,68,.3); }
    .slot-cell.busy      { background: rgba(245,158,11,.15); color: var(--amber); border-color: rgba(245,158,11,.3); }
    .slot-cell.available { background: rgba(34,197,94,.12);  color: var(--green); border-color: rgba(34,197,94,.25); }
    .slot-cell.selected  { border-color: var(--indigo) !important; box-shadow: 0 0 0 1px var(--indigo); }
    .slot-time { font-weight: 600; }
    .slot-cap  { color: var(--muted); font-size: .55rem; margin-top: 1px; }

    .slot-legend {
      display: flex; gap: 14px;
      font-size: .68rem; color: var(--muted);
      margin-bottom: 10px;
    }
    .slot-legend span { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    /* ── Right panel ─────────────────────────────── */
    .rp-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      font-size: .8rem;
      font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
    }
    .rp-content { flex: 1; overflow-y: auto; padding: 16px 18px; }

    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: .78rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-lbl { color: var(--muted); }
    .detail-val { font-weight: 500; }

    /* mini sparkline canvas */
    canvas.spark { width: 100%; height: 60px; display: block; margin: 10px 0; border-radius: 6px; }

    /* ── Log ─────────────────────────────────────── */
    .log-section {
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      max-height: 150px;
      overflow-y: auto;
    }
    .log-section h4 { font-size: .68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .log-entry {
      font-size: .7rem; font-family: 'Courier New', monospace;
      padding: 2px 0; color: var(--muted);
    }
    .log-entry .ts { color: var(--indigo); }
    .log-entry.ok  .msg { color: var(--green); }
    .log-entry.err .msg { color: var(--red); }

    /* ── Toast ───────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: .82rem;
      opacity: 0; transform: translateY(8px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      max-width: 320px;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      padding: 32px 0;
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .panel-right { border-left: none; border-top: 1px solid var(--border); }
      .summary-bar { grid-template-columns: repeat(3,1fr); }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-left">
    <div>
      <div class="logo">Slot<span>Optimizer</span></div>
      <div class="tagline">Hyperlocal delivery · real-time dashboard</div>
    </div>
  </div>
  <div class="conn-pill">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-label">Connecting…</span>
    <span id="conn-count" style="margin-left:4px;opacity:.5"></span>
  </div>
</header>

<!-- ── Summary bar ─────────────────────────────────────────── -->
<div class="summary-bar">
  <div class="summary-stat">
    <div class="val" id="s-zones" style="color:var(--indigo)">—</div>
    <div class="lbl">Active zones</div>
  </div>
  <div class="summary-stat">
    <div class="val" id="s-orders" style="color:var(--blue)">—</div>
    <div class="lbl">Active orders</div>
  </div>
  <div class="summary-stat">
    <div class="val" id="s-slots" style="color:var(--green)">—</div>
    <div class="lbl">Available slots</div>
  </div>
  <div class="summary-stat">
    <div class="val" id="s-load" style="color:var(--amber)">—</div>
    <div class="lbl">Avg zone load</div>
  </div>
  <div class="summary-stat">
    <div class="val" id="s-vehicles" style="color:var(--teal)">—</div>
    <div class="lbl">Active vehicles</div>
  </div>
</div>

<!-- ── Main ────────────────────────────────────────────────── -->
<div class="main">

  <!-- Left panel -->
  <div class="panel-left">

    <!-- Controls -->
    <div class="controls">
      <div class="ctrl-group">
        <label for="zone-sel">Zone</label>
        <select id="zone-sel"><option value="">All zones</option></select>
      </div>
      <div class="ctrl-group">
        <label for="bulk-n">Orders</label>
        <input id="bulk-n" type="number" value="10" min="1" max="300" style="width:72px"/>
      </div>
      <button id="btn-bulk" onclick="simulateBulk()">⚡ Bulk simulate</button>
      <button class="sec" onclick="createSingle()">+ Single order</button>
      <button class="sec" onclick="refresh()">↻ Refresh</button>
    </div>

    <!-- Zone cards -->
    <div class="section-title">Delivery zones</div>
    <div class="zones-grid" id="zones-grid">
      <div class="empty-state">Waiting for data…</div>
    </div>

    <!-- Slot heatmap (shown when a zone is selected) -->
    <div class="slot-section" id="slot-section" style="display:none">
      <div class="section-title" id="slot-section-title">Slot grid</div>
      <div class="slot-legend">
        <span><span class="legend-dot" style="background:rgba(34,197,94,.4)"></span>Available</span>
        <span><span class="legend-dot" style="background:rgba(245,158,11,.4)"></span>Busy (&gt;60%)</span>
        <span><span class="legend-dot" style="background:rgba(239,68,68,.4)"></span>Full</span>
      </div>
      <div class="slot-grid" id="slot-grid"></div>
    </div>

  </div>

  <!-- Right panel: detail + log -->
  <div class="panel-right">
    <div class="rp-header">
      <span id="rp-title">Select a zone</span>
      <span id="rp-updated" style="font-size:.68rem;color:var(--muted);font-weight:400"></span>
    </div>
    <div class="rp-content" id="rp-content">
      <div class="empty-state" style="margin-top:48px">
        Click a zone card<br/>to see details
      </div>
    </div>
    <div class="log-section" id="log-section">
      <h4>Event log</h4>
      <div id="log-list"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '/api';
let zoneMap = {};          // zoneId → ZoneLoadResponse
let selectedZoneId = null;
let selectedSlotId  = null;
let orderHistory = [];     // rolling [{t, count}] for sparkline
let updateCount  = 0;

// ──────────────────────────────────────────────────── SSE

function connectSSE() {
  const es = new EventSource(API + '/stream/zones');

  es.addEventListener('zone-update', e => {
    const zone = JSON.parse(e.data);
    applyZone(zone);
    addLog(`zone-update: ${zone.zoneName} — load ${zone.loadPercent.toFixed(1)}%`, 'ok');
    updateCount++;
    document.getElementById('conn-count').textContent = `(${updateCount} events)`;
  });

  es.addEventListener('zone-snapshot', e => {
    const zones = JSON.parse(e.data);
    zones.forEach(applyZone);
    refreshSummary();
    addLog(`zone-snapshot: ${zones.length} zones refreshed`, '');
  });

  es.onopen = () => {
    document.getElementById('conn-dot').classList.add('live');
    document.getElementById('conn-label').textContent = 'Live';
  };

  es.onerror = () => {
    document.getElementById('conn-dot').classList.remove('live');
    document.getElementById('conn-label').textContent = 'Reconnecting…';
  };
}

// ──────────────────────────────────────────────────── Zone state

function applyZone(zone) {
  const isNew = !zoneMap[zone.zoneId];
  zoneMap[zone.zoneId] = zone;
  renderZoneCard(zone, !isNew);
  if (selectedZoneId === zone.zoneId) renderDetail(zone);
  populateSelect();
  refreshSummary();

  // Rolling history for sparkline
  orderHistory.push({ t: Date.now(), v: Object.values(zoneMap).reduce((a,z)=>a+z.activeOrders,0) });
  if (orderHistory.length > 60) orderHistory.shift();
  drawSparkline();
}

function refreshSummary() {
  const zones = Object.values(zoneMap);
  const active = zones.filter(z => z.status === 'ACTIVE').length;
  const orders  = zones.reduce((a,z) => a + z.activeOrders, 0);
  const slots   = zones.reduce((a,z) => a + z.availableSlots, 0);
  const load    = zones.length ? zones.reduce((a,z) => a + z.loadPercent,0)/zones.length : 0;
  const veh     = zones.reduce((a,z) => a + z.activeVehicles, 0);
  set('s-zones',   active);
  set('s-orders',  orders);
  set('s-slots',   slots);
  set('s-load',    load.toFixed(1) + '%');
  set('s-vehicles',veh);
}

function set(id, v) { document.getElementById(id).textContent = v; }

// ──────────────────────────────────────────────────── Zone card

function renderZoneCard(zone, flash) {
  const grid = document.getElementById('zones-grid');
  const id   = `zc-${zone.zoneId}`;
  const existing = document.getElementById(id);

  const load      = Math.min(100, zone.loadPercent || 0);
  const barColor  = load > 85 ? 'var(--red)' : load > 60 ? 'var(--amber)' : 'var(--green)';
  const badgeCls  = zone.status === 'OVERLOADED' ? 'overload'
                  : zone.status === 'SUSPENDED'  ? 'suspended' : 'active';
  const selected  = selectedZoneId === zone.zoneId ? ' selected' : '';

  const html = `
    <div class="zc-header">
      <div>
        <div class="zc-name">${zone.zoneName}</div>
        <div class="zc-city">${zone.city}</div>
      </div>
      <span class="badge ${badgeCls}">${zone.status}</span>
    </div>
    <div class="zc-stats">
      <div class="zc-stat">
        <div class="val" style="color:var(--blue)">${zone.activeOrders}</div>
        <div class="lbl">Orders</div>
      </div>
      <div class="zc-stat">
        <div class="val" style="color:${barColor}">${zone.availableSlots}</div>
        <div class="lbl">Slots</div>
      </div>
      <div class="zc-stat">
        <div class="val" style="color:var(--teal)">${zone.activeVehicles}</div>
        <div class="lbl">Vehicles</div>
      </div>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${load}%;background:${barColor}"></div></div>
    <div class="bar-row"><span>Load</span><span>${load.toFixed(1)}%</span></div>
    <div class="fleet-row">🚴 ${zone.activeVehicles}/${zone.totalVehicles} active vehicles</div>
  `;

  if (existing) {
    existing.innerHTML = html;
    if (flash) { existing.classList.add('flash'); setTimeout(()=>existing.classList.remove('flash'),700); }
    existing.className = `zone-card${selected}`;
  } else {
    const el = document.createElement('div');
    el.id = id;
    el.className = `zone-card${selected}`;
    el.innerHTML = html;
    el.onclick = () => selectZone(zone.zoneId);
    // Remove placeholder
    const ph = grid.querySelector('.empty-state');
    if (ph) ph.remove();
    grid.appendChild(el);
  }
}

// ──────────────────────────────────────────────────── Zone selection

function selectZone(zoneId) {
  // Deselect old
  if (selectedZoneId) {
    const old = document.getElementById(`zc-${selectedZoneId}`);
    if (old) old.classList.remove('selected');
  }
  selectedZoneId = zoneId;
  const el = document.getElementById(`zc-${zoneId}`);
  if (el) el.classList.add('selected');
  document.getElementById('zone-sel').value = zoneId;
  renderDetail(zoneMap[zoneId]);
  loadSlots(zoneId);
}

function renderDetail(zone) {
  if (!zone) return;
  document.getElementById('rp-title').textContent = zone.zoneName;
  document.getElementById('rp-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

  const load = Math.min(100, zone.loadPercent || 0);
  const barColor = load > 85 ? 'var(--red)' : load > 60 ? 'var(--amber)' : 'var(--green)';

  document.getElementById('rp-content').innerHTML = `
    <canvas class="spark" id="sparkline"></canvas>
    <div class="detail-row"><span class="detail-lbl">City</span><span class="detail-val">${zone.city}</span></div>
    <div class="detail-row"><span class="detail-lbl">Status</span>
      <span class="badge ${zone.status==='OVERLOADED'?'overload':zone.status==='SUSPENDED'?'suspended':'active'}">${zone.status}</span></div>
    <div class="detail-row"><span class="detail-lbl">Active orders</span><span class="detail-val" style="color:var(--blue)">${zone.activeOrders}</span></div>
    <div class="detail-row"><span class="detail-lbl">Available slots</span><span class="detail-val" style="color:var(--green)">${zone.availableSlots}</span></div>
    <div class="detail-row"><span class="detail-lbl">Zone load</span>
      <span class="detail-val" style="color:${barColor}">${load.toFixed(1)}%</span></div>
    <div class="detail-row">
      <span class="detail-lbl">Load bar</span>
      <span style="flex:1;margin-left:12px">
        <div class="bar-bg"><div class="bar-fill" style="width:${load}%;background:${barColor}"></div></div>
      </span>
    </div>
    <div class="detail-row"><span class="detail-lbl">Total vehicles</span><span class="detail-val">${zone.totalVehicles}</span></div>
    <div class="detail-row"><span class="detail-lbl">Active vehicles</span><span class="detail-val" style="color:var(--teal)">${zone.activeVehicles}</span></div>
  `;
  drawSparkline();
}

// ──────────────────────────────────────────────────── Sparkline

function drawSparkline() {
  const canvas = document.getElementById('sparkline');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth, h = 60;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const data = orderHistory.slice(-40);
  if (data.length < 2) return;

  const maxV = Math.max(...data.map(d=>d.v), 1);
  const pts  = data.map((d, i) => ({
    x: (i / (data.length - 1)) * w,
    y: h - 6 - ((d.v / maxV) * (h - 12))
  }));

  // Fill
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(99,102,241,.4)');
  grad.addColorStop(1, 'rgba(99,102,241,.0)');
  ctx.beginPath();
  ctx.moveTo(pts[0].x, h);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length-1].x, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#6366f1';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.stroke();
}

// ──────────────────────────────────────────────────── Slot grid

async function loadSlots(zoneId) {
  const section = document.getElementById('slot-section');
  const grid    = document.getElementById('slot-grid');
  const title   = document.getElementById('slot-section-title');
  const zone    = zoneMap[zoneId];

  title.textContent = `Slot grid — ${zone ? zone.zoneName : ''}`;
  section.style.display = 'block';
  grid.innerHTML = '<div style="color:var(--muted);font-size:.75rem">Loading slots…</div>';

  try {
    const today = new Date().toISOString().slice(0,10);
    const res = await fetch(`${API}/slots/zone/${zoneId}?date=${today}`);
    const slots = await res.json();

    if (!slots.length) {
      grid.innerHTML = '<div class="empty-state">No slots for today</div>';
      return;
    }

    grid.innerHTML = '';
    slots.forEach(slot => {
      const pct = slot.capacity > 0 ? slot.bookedCount / slot.capacity : 1;
      const cls = !slot.available || pct >= 1 ? 'full' : pct > .6 ? 'busy' : 'available';
      const time = slot.windowStart.slice(0,5);
      const cell = document.createElement('div');
      cell.className = `slot-cell ${cls}${selectedSlotId===slot.slotId?' selected':''}`;
      cell.innerHTML = `<div class="slot-time">${time}</div><div class="slot-cap">${slot.remaining}/${slot.capacity}</div>`;
      cell.onclick = () => selectSlot(slot, cell);
      grid.appendChild(cell);
    });
  } catch (e) {
    grid.innerHTML = `<div class="empty-state">Failed to load slots</div>`;
  }
}

function selectSlot(slot, cell) {
  selectedSlotId = slot.slotId;
  document.querySelectorAll('.slot-cell').forEach(c => c.classList.remove('selected'));
  cell.classList.add('selected');
  showToast(`Slot ${slot.windowStart.slice(0,5)}–${slot.windowEnd.slice(0,5)} · ${slot.remaining}/${slot.capacity} remaining`);
}

// ──────────────────────────────────────────────────── Actions

async function refresh() {
  try {
    const res = await fetch(API + '/zones');
    const zones = await res.json();
    zones.forEach(applyZone);
    if (selectedZoneId) loadSlots(selectedZoneId);
    addLog(`Manual refresh: ${zones.length} zones`, '');
  } catch (e) { addLog('Refresh error: ' + e.message, 'err'); }
}

async function simulateBulk() {
  const btn    = document.getElementById('btn-bulk');
  const count  = parseInt(document.getElementById('bulk-n').value) || 10;
  const zoneId = document.getElementById('zone-sel').value || null;

  btn.disabled = true;
  btn.textContent = '⏳ Running…';

  try {
    const res = await fetch(API + '/orders/simulate/bulk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        orderCount: count,
        zoneId: zoneId ? parseInt(zoneId) : null,
        randomZones: !zoneId
      })
    });
    const data = await res.json();
    showToast(`✅ ${data.allocated} allocated · ${data.failed} failed`);
    addLog(`Bulk: ${data.allocated}/${data.requested} allocated`, data.failed > 0 ? '' : 'ok');
    if (selectedZoneId) loadSlots(selectedZoneId);
  } catch (e) {
    addLog('Bulk error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ Bulk simulate';
  }
}

async function createSingle() {
  const zoneId = document.getElementById('zone-sel').value
              || (selectedZoneId ? String(selectedZoneId) : null);
  if (!zoneId) { showToast('Select a zone first'); return; }

  const ref = 'DASH-' + Date.now();
  try {
    const res = await fetch(API + '/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        externalRef: ref,
        zoneId: parseInt(zoneId),
        customerName: 'Dashboard User',
        deliveryAddress: '1 Test Lane, Demo City'
      })
    });
    const data = await res.json();
    if (res.ok) {
      showToast(`Order ${ref} → slot ${data.slotId}`);
      addLog(`Single order: ${ref} → slot ${data.slotId}`, 'ok');
      if (selectedZoneId) loadSlots(selectedZoneId);
    } else {
      showToast('❌ ' + (data.message || data.error));
      addLog('Order failed: ' + (data.error || data.message), 'err');
    }
  } catch (e) {
    addLog('Order error: ' + e.message, 'err');
  }
}

// ──────────────────────────────────────────────────── Helpers

function populateSelect() {
  const sel = document.getElementById('zone-sel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All zones</option>';
  Object.values(zoneMap).forEach(z => {
    const o = document.createElement('option');
    o.value = z.zoneId; o.textContent = `${z.zoneName} (${z.city})`;
    sel.appendChild(o);
  });
  sel.value = cur;
  sel.onchange = () => { if (sel.value) selectZone(parseInt(sel.value)); };
}

function addLog(msg, type) {
  const list = document.getElementById('log-list');
  const el = document.createElement('div');
  el.className = `log-entry ${type||''}`;
  el.innerHTML = `<span class="ts">[${new Date().toLocaleTimeString()}]</span> <span class="msg">${msg}</span>`;
  list.prepend(el);
  while (list.children.length > 60) list.removeChild(list.lastChild);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ──────────────────────────────────────────────────── Boot
connectSSE();
refresh();
</script>
